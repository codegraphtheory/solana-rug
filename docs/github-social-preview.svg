<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(245,159,0,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59f00"/>
      <stop offset="100%" stop-color="#fcc419"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="640" cy="320" r="420" fill="url(#glow)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accent)"/>

  <!-- GitHub corner mark -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="180" height="36" rx="6" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="14" y="23" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#e4e4e7">rugpullnet/</text>
    <text x="105" y="23" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="700" fill="#f59f00">solana-rug</text>
  </g>

  <!-- Shield icon -->
  <g transform="translate(80, 170)">
    <path d="M60 0 L120 30 L120 100 C120 160 60 190 60 190 C60 190 0 160 0 100 L0 30 Z" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <path d="M60 20 L108 43 L108 95 C108 145 60 170 60 170 C60 170 12 145 12 95 L12 43 Z" fill="rgba(245,159,0,0.08)"/>
    <path d="M45 95 L55 105 L75 80" fill="none" stroke="#f59f00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="160" y="130" font-family="'Inter', system-ui, sans-serif" font-size="58" font-weight="800" fill="#ffffff">Rugpull <tspan fill="#f59f00">$RUG</tspan></text>
  <text x="160" y="180" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="500" fill="#a0a0b0">13-Factor On-Chain Rug-Pull Detection Engine</text>

  <!-- Feature cards row 1 -->
  <g transform="translate(80, 230)">
    <rect x="0" y="0" width="268" height="76" rx="8" fill="url(#card)" stroke="#1a1a2e" stroke-width="1"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59f00">DETERMINISTIC</text>
    <text x="16" y="50" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#e4e4e7">Same input, same score</text>
    <text x="16" y="66" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="400" fill="#6b6b80">Per-factor breakdown</text>
  </g>
  <g transform="translate(360, 230)">
    <rect x="0" y="0" width="268" height="76" rx="8" fill="url(#card)" stroke="#1a1a2e" stroke-width="1"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59f00">OPEN SOURCE</text>
    <text x="16" y="50" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#e4e4e7">MIT Licensed</text>
    <text x="16" y="66" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="400" fill="#6b6b80">Zero paid APIs</text>
  </g>
  <g transform="translate(640, 230)">
    <rect x="0" y="0" width="268" height="76" rx="8" fill="url(#card)" stroke="#1a1a2e" stroke-width="1"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59f00">AUDITABLE</text>
    <text x="16" y="50" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#e4e4e7">Single Python file</text>
    <text x="16" y="66" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="400" fill="#6b6b80">Run it offline</text>
  </g>
  <g transform="translate(920, 230)">
    <rect x="0" y="0" width="268" height="76" rx="8" fill="url(#card)" stroke="#1a1a2e" stroke-width="1"/>
    <text x="16" y="28" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="700" fill="#f59f00">HERMES SKILL</text>
    <text x="16" y="50" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#e4e4e7">Natural language queries</text>
    <text x="16" y="66" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="400" fill="#6b6b80">"Is this token safe?"</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1280" height="50" fill="#0a0a0f" opacity="0.5"/>
  <text x="80" y="620" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#5c5c72">pip install solana-rug</text>
  <text x="480" y="620" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#5c5c72">github.com/rugpullnet/solana-rug</text>
  <text x="980" y="620" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="500" fill="#5c5c72"># Bounties: 5M $RUG</text>
</svg>
